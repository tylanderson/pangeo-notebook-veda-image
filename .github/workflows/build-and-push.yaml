name: Build and push container image

on:
  workflow_dispatch:
  push:
    branches:
      - "**" # Push to any branch
    tags:
      - "**"
    paths-ignore:
      - "README.md"
      - "LICENSE"

env:
  REGISTRY: public.ecr.aws
  NAMESPACE: nasa-veda
  IMAGE_NAME: pangeo-notebook-veda-image

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Checkout repository
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        persist-credentials: false

    - name: Set up Docker Buildx
      id: buildx
      uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Login to Amazon ECR Public
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2.1.6
      with:
        registry-type: public

    - uses: int128/create-ecr-repository-action@c1b18173fe6f1285019539f07583f568bc304154 # v1.99.0
      with:
        repository: ${{ env.IMAGE_NAME}}
        public: true

    - name: Build container image
      uses: NASA-IMPACT/repo2docker-action@34067d0a6e74e5b6b417bf5c034f77c8a3c4d91d # master
      with:
        DOCKER_REGISTRY: ${{ env.REGISTRY }}
        IMAGE_NAME: ${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}
        REPO_DIR: /srv/repo
        NO_PUSH: "true"

    - name: Set image tag
      id: set_tag
      run: |
        if [[ $GITHUB_REF == refs/tags/* ]]; then
          echo "IMAGE_TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        else
          echo "IMAGE_TAG=$(echo ${{ github.sha }} | cut -c1-12)" >> $GITHUB_OUTPUT
        fi

    - name: Tag and push image
      if: github.event_name == 'push'
      env:
        IMAGE_TAG: ${{ steps.set_tag.outputs.IMAGE_TAG }}
        GITHUB_REF_NAME: ${{ github.ref }}
      run: |
        FULL_IMAGE_NAME=${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}
        docker tag $FULL_IMAGE_NAME:latest $FULL_IMAGE_NAME:$IMAGE_TAG
        docker push $FULL_IMAGE_NAME:$IMAGE_TAG || exit 1
        echo "Pushed image: $FULL_IMAGE_NAME:$IMAGE_TAG"

        if [[ "$GITHUB_REF_NAME" == "refs/heads/main" ]]; then
          docker push $FULL_IMAGE_NAME:latest || exit 1
          echo "Pushed image: $FULL_IMAGE_NAME:latest"
        fi
